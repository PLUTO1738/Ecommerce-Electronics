{% extends 'eshop/base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="card support-card shadow-lg border-0">
                <div class="card-header bg-warning text-white text-center py-4">
                    <h2 class="mb-0 text-uppercase"><i class="bi bi-chat-dots me-2"></i>Live Support Chat</h2>
                    <p class="mb-0 mt-2">Ask about products, orders, or anything!</p>
                </div>
                <div class="card-body p-4">
                    <div id="chat-replies" class="chat-replies mb-4 p-3 bg-light rounded border" style="height: 400px; overflow-y: auto;">
                        <div class="welcome-msg text-center text-muted py-3">
                            <i class="bi bi-robot fs-3 text-orange mb-2 d-block"></i>
                            <strong>Hello! I'm here to help.</strong><br>
                            <small class="text-muted">Click suggestions below or type naturally!</small>
                        </div>
                    </div>
                    <div class="input-group">
                        <input type="text" id="chat-input" class="form-control border-orange" placeholder="Type your message...">
                        <button id="chat-send" class="btn btn-orange">
                            <i class="bi bi-send"></i> Send
                        </button>
                    </div>
                    <div id="suggestions" class="suggestions mt-3">
                        <small class="text-muted">Suggested:</small>
                        <div class="btn-group btn-group-sm mt-1 flex-wrap" role="group"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const chatInput = document.getElementById("chat-input");
    const chatReplies = document.getElementById("chat-replies");
    const chatSend = document.getElementById("chat-send");

    // Remove welcome message on first input
    chatInput.addEventListener("focus", function() {
        if (chatReplies.innerHTML.includes('welcome-msg')) {
            chatReplies.innerHTML = '';
        }
    });

    // Send on Enter
    chatInput.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

    chatSend.addEventListener("click", sendMessage);

    const suggestions = [
        'iPhone price', 'MacBook specs', 'delivery time',
        'order status', 'payment methods', 'show reviews',
        'shipping cost', 'help'
    ];

    function initSuggestions() {
        const btnGroup = document.querySelector('#suggestions .btn-group');
        suggestions.forEach(suggestion => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn btn-outline-orange btn-sm me-1 mb-1';
            btn.textContent = suggestion;
            btn.onclick = () => {
                chatInput.value = suggestion;
                chatInput.focus();
            };
            btnGroup.appendChild(btn);
        });
    }

    function sendMessage() {
        const message = chatInput.value.trim();
        if (!message) return;

        // User message
        chatReplies.innerHTML += `
            <div class="d-flex justify-content-end mb-2">
                <div class="p-2 bg-orange text-white rounded-pill max-w-75">
                    ${message}
                </div>
            </div>
        `;

        chatInput.value = '';
        chatReplies.scrollTop = chatReplies.scrollHeight;

        // Bot response
        fetch(`/contact/?message=${encodeURIComponent(message)}`)
            .then(response => response.json())
            .then(data => {
                chatReplies.innerHTML += `
                    <div class="d-flex justify-content-start mb-2">
                        <div class="p-2 bg-light border rounded-3 max-w-75">
                            <strong>Bot:</strong> ${data.response}
                        </div>
                    </div>
                `;
                chatReplies.scrollTop = chatReplies.scrollHeight;
            })
            .catch(() => {
                chatReplies.innerHTML += `
                    <div class="d-flex justify-content-start mb-2">
                        <div class="p-2 bg-light border rounded-3 max-w-75">
                            <strong>Bot:</strong> Sorry, something went wrong. Try again!
                        </div>
                    </div>
                `;
                chatReplies.scrollTop = chatReplies.scrollHeight;
            });
    }

    // Init
    initSuggestions();
});
</script>
{% endblock %}
